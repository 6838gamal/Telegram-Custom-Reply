<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Telegram Login</h2>

        {% if step == "phone" %}
        <form method="post" action="/send_code">
            <input type="text" name="phone" placeholder="+967..." required>
            <button class="btn success">Send Code</button>
        </form>
        {% endif %}

        {% if step == "code" %}
        <form method="post" action="/verify_code">
            <input type="text" name="code" placeholder="Enter Code" required>
            <button class="btn success">Verify</button>
        </form>
        {% endif %}

        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}

    </div>

</div>

</body>
</html>
