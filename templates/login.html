<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container card">

<h2>Telegram Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if not telegram_ready %}
<p class="error">Telegram API credentials are not configured. Add API_ID and API_HASH to enable login and auto-replies.</p>
{% endif %}

{% if step == "phone" %}
<form method="post" action="/send_code">
<input name="phone" placeholder="Phone">
<button class="btn">Send Code</button>
</form>
{% endif %}

{% if step == "code" %}
<form method="post" action="/verify">
<input name="code" placeholder="Code">
<button class="btn">Verify</button>
</form>
{% endif %}

</div>

</body>
</html>
