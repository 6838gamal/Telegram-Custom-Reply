<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Bot Dashboard</h1>
    <p class="status">Status: {{ status }}</p>

    <div class="card">
        <h2>Keywords</h2>

        <form method="post" action="/update_keywords">
            {% for kw in keywords %}
            <div class="row">
                <input type="text" name="keywords" value="{{ kw }}">
                <button name="delete" value="{{ kw }}" class="btn danger">Delete</button>
            </div>
            {% endfor %}

            <div class="actions">
                <button name="add" value="1" class="btn info">Add</button>
                <button class="btn success">Save</button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
