<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">

<!-- LEFT -->
<div class="left">

<h2>Keywords</h2>

<form method="post" action="/keywords">
{% for k in keywords %}
<input name="keywords" value="{{ k }}">
{% endfor %}
<button>Save</button>
</form>

<hr>

<h2>Load Chats</h2>

<button onclick="loadChats()">Load Telegram Chats</button>

<form method="post" action="/save_chats">
<div id="chatBox"></div>
<div id="typeBox"></div>
<div id="replyBox"></div>

<button>Save Chats</button>
</form>

</div>

<!-- RIGHT -->
<div class="right">

<h2>Saved Chats</h2>
<div id="savedChats"></div>

<h2>Broadcast</h2>
<form method="post" action="/broadcast">
<textarea name="message">{{ broadcast_message }}</textarea>
<button>Send</button>
</form>

</div>

</div>

<script>

async function loadChats(){
    const res = await fetch("/load_chats");
    const data = await res.json();

    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    data.chats.forEach(c=>{
        box.innerHTML += `
        <div>
            <input type="checkbox" name="selected" value="${c.id}">
            <input name="types" value="${c.type}">
            <select name="reply_types">
                <option value="group">Group Reply</option>
                <option value="private">Private Reply</option>
                <option value="default">Default</option>
            </select>
            ${c.name}
        </div>`;
    });
}

</script>

</body>
</html>
